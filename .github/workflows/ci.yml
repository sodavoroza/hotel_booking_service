name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run black check
        run: poetry run black --check .

      - name: Run pytest
        run: poetry run pytest src/

      - name: Build Docker image
        run: docker build -t hotel-booking-service .

      - name: Verify Docker image
        run: docker run --rm hotel-booking-service poetry run python src/hotel_booking_service/manage.py --help || true
